<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 项目信息查询</title>
  <link rel="stylesheet" href="style.css?v=28">
</head>
<body>
  <div class="hero">
    <div class="hero-mesh" aria-hidden="true"></div>
    <div class="container hero-content">
      <header class="page-header">
        <div class="page-title">
          <h1>设置</h1>
          <p>本地归档、数据库连接与导出字段配置</p>
        </div>
        <a href="index.html" class="btn-secondary settings-btn">返回查询</a>
      </header>
    </div>
  </div>

  <main class="container settings-container">
    <section class="card settings-card">
      <div class="settings-card-header">
        <h2>本地归档</h2>
        <p>插件点击“提交到数据库”后，会自动归档下载的立项批复文件并生成字段 Excel。</p>
      </div>
      <div class="settings-form">
        <div class="settings-row">
          <label for="archiveFolder">归档文件夹</label>
          <input type="text" id="archiveFolder" placeholder="例如 C:\Users\xxx\Desktop\项目批复文件">
        </div>
        <div class="settings-row">
          <label for="downloadDir">浏览器默认下载目录</label>
          <input type="text" id="downloadDir" placeholder="例如 C:\Users\xxx\Downloads">
        </div>
      </div>
    </section>

    <section class="card settings-card">
      <div class="settings-card-header">
        <h2>数据库</h2>
        <p>网页与插件共用同一套数据库配置，修改后即时生效。</p>
      </div>
      <div class="settings-form">
        <div class="settings-row">
          <label for="dbHost">主机</label>
          <input type="text" id="dbHost" placeholder="localhost">
        </div>
        <div class="settings-row">
          <label for="dbPort">端口</label>
          <input type="number" id="dbPort" placeholder="3306">
        </div>
        <div class="settings-row">
          <label for="dbUser">用户名</label>
          <input type="text" id="dbUser" placeholder="root">
        </div>
        <div class="settings-row">
          <label for="dbPassword">密码</label>
          <input type="password" id="dbPassword" placeholder="">
        </div>
        <div class="settings-row">
          <label for="dbName">数据库名</label>
          <input type="text" id="dbName" placeholder="project_tracker">
        </div>
        <div class="settings-row settings-row-action">
          <label></label>
          <button type="button" id="testDbBtn" class="btn-secondary">测试连接</button>
          <span id="dbTestStatus" class="settings-status"></span>
        </div>
      </div>
    </section>

    <section class="card settings-card">
      <div class="settings-card-header">
        <h2>导出字段</h2>
        <p>勾选需要在“项目信息查询”页面导出 Excel 时包含的字段。</p>
      </div>
      <div class="settings-row" style="align-items: flex-start;">
        <label style="padding-top: 4px;">导出字段</label>
        <div id="exportFields" class="export-fields"></div>
      </div>
    </section>

    <section class="card settings-card">
      <div class="settings-card-header">
        <h2>关注标签</h2>
        <p>配置“关注项目”页面可选的关注类型标签及颜色，添加、变更关注时勾选使用。</p>
      </div>
      <div class="settings-row" style="align-items: flex-start;">
        <label style="padding-top: 4px;">标签列表</label>
        <div class="watch-tags-area">
          <div id="watchTagsList" class="watch-tags-list"></div>
          <div class="watch-tags-add">
            <input type="text" id="newTagName" placeholder="新标签名称">
            <input type="color" id="newTagColor" value="#533afd">
            <button type="button" id="addTagBtn" class="btn-secondary">添加标签</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card settings-save-card">
      <div class="settings-actions">
        <button type="button" id="saveSettingsBtn" class="btn-primary">保存设置</button>
        <span id="settingsStatus" class="settings-status"></span>
      </div>
    </section>
  </main>

  <script src="settings.js?v=2"></script>
</body>
</html>
