<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>变更项目信息</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .edit-form {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: var(--space-md) var(--space-xl);
      padding: var(--space-lg);
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-secondary);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      font-family: inherit;
      font-size: 14px;
      font-weight: 300;
      color: var(--ink);
      background: var(--canvas);
      border: 1px solid var(--hairline-input);
      border-radius: var(--rounded-sm);
      padding: var(--space-sm) var(--space-md);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }
    .form-group input[type="number"] {
      text-align: right;
    }
    .form-actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-lg);
      border-top: 1px solid var(--hairline);
    }
    .btn-danger {
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      line-height: 1;
      border-radius: var(--rounded-pill);
      padding: var(--space-sm) var(--space-lg);
      cursor: pointer;
      border: 1px solid transparent;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      background: var(--canvas);
      color: var(--ruby);
      border-color: rgba(234, 34, 97, 0.35);
    }
    .btn-danger:hover {
      background: rgba(234, 34, 97, 0.06);
    }
    .readonly-field {
      background: var(--canvas-soft) !important;
      color: var(--ink-mute) !important;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-mesh" aria-hidden="true"></div>
    <div class="container hero-content">
      <header class="page-header">
        <div class="page-title">
          <h1>变更项目信息</h1>
          <p>查看并编辑数据库中的全量项目信息</p>
        </div>
        <a href="index.html" class="btn-secondary settings-btn">返回查询</a>
      </header>
    </div>
  </div>

  <main class="container">
    <div id="loading" class="loading card">加载中...</div>
    <div id="error" class="error card" style="display: none;"></div>

    <form id="editForm" class="card" style="display: none;">
      <div class="edit-form" id="formFields"></div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">保存变更</button>
        <button type="button" id="deleteBtn" class="btn-danger">删除记录</button>
        <a href="index.html" class="btn-secondary">取消</a>
      </div>
    </form>
  </main>

  <script src="edit.js"></script>
</body>
</html>
