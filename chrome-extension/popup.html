<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 240px; padding: 16px; font-family: system-ui, -apple-system, sans-serif; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    p { font-size: 13px; color: #666; margin: 0 0 16px; }
    button {
      width: 100%;
      padding: 10px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #4096ff; }
    #status { margin-top: 10px; font-size: 12px; color: #333; min-height: 18px; }
    .error { color: #ff4d4f; }
  </style>
</head>
<body>
  <h1>项目信息一键提取</h1>
  <p>点击按钮提取当前页面立项批复正文，并在侧边栏中编辑后提交。</p>
  <button id="extractBtn">一键提取</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
